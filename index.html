<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILMU Bot – Background</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #4DFFA0; }
    50%       { opacity: 0.4; box-shadow: 0 0 2px #4DFFA0; }
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .ring {
    position: absolute; border-radius: 50%; border: 1px solid;
    animation: spin linear infinite;
  }
  .status-dot {
    display: inline-block; border-radius: 50%; background: #4DFFA0;
    animation: pulse-dot 2s ease-in-out infinite;
    vertical-align: middle; margin-right: 5px;
  }
  .corner { position: absolute; }
  .corner.tl { top:0; left:0;  border-top:  1.5px solid rgba(80,200,255,0.55); border-left:  1.5px solid rgba(80,200,255,0.55); }
  .corner.tr { top:0; right:0; border-top:  1.5px solid rgba(80,200,255,0.55); border-right: 1.5px solid rgba(80,200,255,0.55); }
  .corner.bl { bottom:0; left:0;  border-bottom: 1.5px solid rgba(80,200,255,0.55); border-left:  1.5px solid rgba(80,200,255,0.55); }
  .corner.br { bottom:0; right:0; border-bottom: 1.5px solid rgba(80,200,255,0.55); border-right: 1.5px solid rgba(80,200,255,0.55); }

  /* Tweaks panel */
  .tp {
    position: fixed; bottom: 72px; right: 12px; z-index: 9999;
    background: rgba(6,10,26,0.93); border: 1px solid rgba(80,200,255,0.22);
    backdrop-filter: blur(16px); width: 232px;
    animation: fadeIn 0.18s ease;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  }
  .tp-head {
    padding: 11px 14px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(120,200,255,0.8); border-bottom: 1px solid rgba(80,200,255,0.12);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tp-x { background:none; border:none; cursor:pointer; color:rgba(120,200,255,0.7); font-size:13px; }
  .tp-x:hover { color:#fff; }
  .tp-sec { padding: 9px 14px 3px; font-size: 9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(80,200,255,0.38); font-weight:500; }
  .tp-row { padding: 5px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .tp-lbl { font-size: 11px; color: rgba(200,230,255,0.7); flex:1; }
  .tp-col { width:26px; height:18px; border-radius:3px; border:1px solid rgba(80,200,255,0.3); cursor:pointer; }
  .tp-sel {
    background: rgba(80,200,255,0.07); border: 1px solid rgba(80,200,255,0.18);
    color: rgba(200,230,255,0.8); font-size:10px; padding:3px 5px;
    font-family:'Space Grotesk',sans-serif; cursor:pointer; flex:1; max-width:115px;
  }
  .tp-rng { flex:1; accent-color:#50C8FF; }
  .tp-tog {
    width:30px; height:17px; border-radius:9px; border:none; cursor:pointer;
    position:relative; transition:background 0.2s; flex-shrink:0;
  }
  .tp-tog-t {
    position:absolute; top:2px; width:13px; height:13px;
    border-radius:50%; background:#fff; transition:left 0.2s;
  }

  .dl-btn {
    position: fixed; bottom: 14px; right: 14px; z-index: 9999;
    background: rgba(80,200,255,0.1); border: 1px solid rgba(80,200,255,0.32);
    color: rgba(200,240,255,0.88); font-family:'Space Mono',monospace;
    font-size: 10px; letter-spacing:0.14em; text-transform:uppercase;
    padding: 8px 16px; cursor:pointer; backdrop-filter:blur(10px); transition:all 0.2s;
  }
  .dl-btn:hover { background:rgba(80,200,255,0.22); border-color:rgba(80,200,255,0.7); box-shadow:0 0 18px rgba(80,200,255,0.22); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#50C8FF",
  "secondAccent": "#A855F7",
  "bgDepth": "deep",
  "showTagline": true,
  "nodeCount": 50,
  "showHexGrid": true,
  "glowIntensity": "medium",
  "logoStyle": "full"
}/*EDITMODE-END*/;

/* ─── Tweaks Panel ─────────────────────────────────────────────────────────── */
function TweaksPanel({ tweaks, set, visible, onClose }) {
  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode')   onClose(false);
      if (e.data?.type === '__deactivate_edit_mode') onClose(true);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  if (!visible) return null;

  const Toggle = ({ id }) => (
    <button className="tp-tog"
      style={{ background: tweaks[id] ? 'rgba(80,200,255,0.58)' : 'rgba(80,200,255,0.14)' }}
      onClick={() => set(id, !tweaks[id])}>
      <div className="tp-tog-t" style={{ left: tweaks[id] ? 15 : 2 }}></div>
    </button>
  );

  return (
    <div className="tp">
      <div className="tp-head">
        Tweaks
        <button className="tp-x" onClick={() => { onClose(true); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }}>✕</button>
      </div>

      <div className="tp-sec">Colors</div>
      <div className="tp-row"><span className="tp-lbl">Primary</span>
        <input type="color" className="tp-col" value={tweaks.accentColor} onChange={e=>set('accentColor',e.target.value)}/>
      </div>
      <div className="tp-row"><span className="tp-lbl">Secondary</span>
        <input type="color" className="tp-col" value={tweaks.secondAccent} onChange={e=>set('secondAccent',e.target.value)}/>
      </div>

      <div className="tp-sec">Background</div>
      <div className="tp-row"><span className="tp-lbl">Depth</span>
        <select className="tp-sel" value={tweaks.bgDepth} onChange={e=>set('bgDepth',e.target.value)}>
          <option value="ocean">Ocean</option>
          <option value="deep">Space Dark</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <div className="tp-row"><span className="tp-lbl">Hex Grid</span><Toggle id="showHexGrid"/></div>
      <div className="tp-row"><span className="tp-lbl">Glow</span>
        <select className="tp-sel" value={tweaks.glowIntensity} onChange={e=>set('glowIntensity',e.target.value)}>
          <option value="low">Subtle</option>
          <option value="medium">Medium</option>
          <option value="high">Intense</option>
        </select>
      </div>
      <div className="tp-row"><span className="tp-lbl">Nodes ({tweaks.nodeCount})</span>
        <input type="range" className="tp-rng" min={15} max={100} step={5}
          value={tweaks.nodeCount} onChange={e=>set('nodeCount',Number(e.target.value))}/>
      </div>

      <div className="tp-sec">Branding</div>
      <div className="tp-row"><span className="tp-lbl">Style</span>
        <select className="tp-sel" value={tweaks.logoStyle} onChange={e=>set('logoStyle',e.target.value)}>
          <option value="full">Full</option>
          <option value="minimal">Name only</option>
        </select>
      </div>
      <div className="tp-row" style={{marginBottom:8}}><span className="tp-lbl">Tagline</span><Toggle id="showTagline"/></div>
    </div>
  );
}

/* ─── Canvas ───────────────────────────────────────────────────────────────── */
function NeuralCanvas({ width, height, tweaks }) {
  const ref = useRef(null);
  const raf = useRef(null);
  const h2r = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];

  useEffect(() => {
    if (!width || !height) return;
    const cv = ref.current;
    const cx = cv.getContext('2d');
    cv.width = width; cv.height = height;

    const a1 = h2r(tweaks.accentColor);
    const a2 = h2r(tweaks.secondAccent);
    const gm = tweaks.glowIntensity==='low'?.5:tweaks.glowIntensity==='high'?1.8:1;
    const N  = tweaks.nodeCount;

    const nodes = Array.from({length:N}, ()=>({
      x: Math.random()*width, y: Math.random()*height,
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
      r: Math.random()*2+.8, phase:Math.random()*Math.PI*2, spd:Math.random()*.02+.005,
    }));

    const hexes = [];
    if (tweaks.showHexGrid) {
      const hr=55, hw=hr*2, hh=Math.sqrt(3)*hr;
      for (let row=-2;row<height/hh+2;row++)
        for (let col=-2;col<width/hw+2;col++)
          hexes.push({x:col*hw*.75, y:row*hh+(col%2===0?0:hh/2), r:hr,
            al:Math.random()*.055+.01, phase:Math.random()*Math.PI*2});
    }

    function hp(x,y,r) {
      cx.beginPath();
      for (let i=0;i<6;i++) {
        const a=(Math.PI/3)*i-Math.PI/6;
        i===0?cx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):cx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
      }
      cx.closePath();
    }

    let t=0;
    function draw() {
      cx.clearRect(0,0,width,height);
      // BG gradient
      const bg=cx.createRadialGradient(width*.5,height*.4,0,width*.5,height*.5,height*.7);
      const d=tweaks.bgDepth;
      bg.addColorStop(0, d==='midnight'?'rgb(15,5,30)':d==='ocean'?'rgb(5,18,40)':'rgb(8,14,35)');
      bg.addColorStop(.5,d==='midnight'?'rgb(8,3,20)':d==='ocean'?'rgb(3,10,28)':'rgb(5,8,22)');
      bg.addColorStop(1, d==='midnight'?'rgb(2,1,8)':d==='ocean'?'rgb(1,5,15)':'rgb(2,3,10)');
      cx.fillStyle=bg; cx.fillRect(0,0,width,height);

      // Nebula blobs
      [[width*.15,height*.25,width*.6,a1],[width*.85,height*.7,width*.5,a2],[width*.5,height*.5,width*.4,a1]].forEach(([bx,by,br,c])=>{
        const g=cx.createRadialGradient(bx,by,0,bx,by,br);
        g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${.07*gm})`);
        g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
        cx.fillStyle=g; cx.beginPath(); cx.arc(bx,by,br,0,Math.PI*2); cx.fill();
      });

      // Hex grid
      hexes.forEach(h=>{
        const al=(Math.sin(t*.3+h.phase)*.5+.5)*h.al;
        cx.strokeStyle=`rgba(${a1[0]},${a1[1]},${a1[2]},${al})`; cx.lineWidth=.4;
        hp(h.x,h.y,h.r); cx.stroke();
      });

      // Connections
      const md=150;
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<md){
          const al=(1-dist/md)*.3*gm;
          const m=(nodes[i].phase+nodes[j].phase)/(Math.PI*4);
          cx.strokeStyle=`rgba(${Math.round(a1[0]*(1-m)+a2[0]*m)},${Math.round(a1[1]*(1-m)+a2[1]*m)},${Math.round(a1[2]*(1-m)+a2[2]*m)},${al})`;
          cx.lineWidth=(1-dist/md);
          cx.beginPath(); cx.moveTo(nodes[i].x,nodes[i].y); cx.lineTo(nodes[j].x,nodes[j].y); cx.stroke();
        }
      }

      // Core glow (centered upper-half)
      const ccx=width*.5, ccy=height*.38, cr=80+Math.sin(t*.5)*10;
      const cg=cx.createRadialGradient(ccx,ccy,0,ccx,ccy,cr);
      cg.addColorStop(0,`rgba(${a1[0]},${a1[1]},${a1[2]},${.2*gm})`);
      cg.addColorStop(.4,`rgba(${a1[0]},${a1[1]},${a1[2]},${.07*gm})`);
      cg.addColorStop(1,`rgba(${a1[0]},${a1[1]},${a1[2]},0)`);
      cx.fillStyle=cg; cx.beginPath(); cx.arc(ccx,ccy,cr,0,Math.PI*2); cx.fill();

      // Nodes
      nodes.forEach(n=>{
        const pulse=Math.sin(t*n.spd*60+n.phase);
        const r=n.r+pulse*.7, al=.5+pulse*.28;
        const m=n.phase/(Math.PI*2);
        const nr=Math.round(a1[0]*(1-m)+a2[0]*m), ng=Math.round(a1[1]*(1-m)+a2[1]*m), nb=Math.round(a1[2]*(1-m)+a2[2]*m);
        const ng2=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*5);
        ng2.addColorStop(0,`rgba(${nr},${ng},${nb},${.14*gm})`);
        ng2.addColorStop(1,`rgba(${nr},${ng},${nb},0)`);
        cx.fillStyle=ng2; cx.beginPath(); cx.arc(n.x,n.y,r*5,0,Math.PI*2); cx.fill();
        cx.fillStyle=`rgba(${nr},${ng},${nb},${al})`; cx.beginPath(); cx.arc(n.x,n.y,r,0,Math.PI*2); cx.fill();
        n.x+=n.vx; n.y+=n.vy;
        if(n.x<0)n.x=width; if(n.x>width)n.x=0;
        if(n.y<0)n.y=height; if(n.y>height)n.y=0;
      });

      t+=.016;
      raf.current=requestAnimationFrame(draw);
    }
    draw();
    return ()=>cancelAnimationFrame(raf.current);
  }, [width, height, JSON.stringify(tweaks)]);

  return <canvas ref={ref} style={{position:'absolute',top:0,left:0}}/>;
}

/* ─── Overlay ──────────────────────────────────────────────────────────────── */
function Overlay({ width, height, tweaks }) {
  // Portrait scale: reference 390×844
  const s  = Math.min(width/390, height/844);
  const ac = tweaks.accentColor;
  const a2 = tweaks.secondAccent;
  const rR = 80*s; // ring radius

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:10}}>

      {/* Corners */}
      {[['tl',{top:0,left:0}],['tr',{top:0,right:0}],['bl',{bottom:0,left:0}],['br',{bottom:0,right:0}]].map(([cls,pos])=>(
        <div key={cls} className={`corner ${cls}`} style={{...pos,width:36*s,height:36*s}}></div>
      ))}

      {/* Logo block */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0,marginTop:-40*s}}>

        {/* Rings + hex icon */}
        <div style={{position:'relative',width:rR*2,height:rR*2,display:'flex',
          alignItems:'center',justifyContent:'center',marginBottom:24*s}}>
          <div className="ring" style={{width:rR*2,height:rR*2,borderColor:`${ac}20`,animationDuration:'28s'}}></div>
          <div className="ring" style={{width:rR*1.55,height:rR*1.55,borderColor:`${ac}3a`,
            borderStyle:'dashed',animationDuration:'18s',animationDirection:'reverse'}}></div>
          <div className="ring" style={{width:rR,height:rR,borderColor:`${ac}65`,animationDuration:'12s'}}></div>

          <svg width={rR*.55} height={rR*.55} viewBox="0 0 80 80" style={{position:'relative',zIndex:2}}>
            <defs>
              <radialGradient id="hg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor={ac} stopOpacity="0.9"/>
                <stop offset="100%" stopColor={a2} stopOpacity="0.6"/>
              </radialGradient>
            </defs>
            <polygon points="40,4 74,22 74,58 40,76 6,58 6,22" fill="none" stroke={ac} strokeWidth="1.5" strokeOpacity="0.5"/>
            <polygon points="40,18 60,29 60,51 40,62 20,51 20,29" fill="url(#hg)" fillOpacity="0.12" stroke={ac} strokeWidth="1" strokeOpacity="0.85"/>
            <circle cx="40" cy="40" r="5" fill={ac} fillOpacity="0.95"/>
            {[[40,18],[60,29],[60,51],[40,62],[20,51],[20,29]].map(([x,y],i)=>(
              <g key={i}>
                <line x1={x} y1={y} x2="40" y2="40" stroke={ac} strokeWidth="0.8" strokeOpacity="0.4"/>
                <circle cx={x} cy={y} r="2.2" fill={i%2===0?ac:a2} fillOpacity="0.85"/>
              </g>
            ))}
          </svg>
        </div>

        {/* ILMU BOT */}
        <div style={{
          fontFamily:"'Space Grotesk', sans-serif", fontWeight:700,
          fontSize: 52*s, letterSpacing:'0.16em', textTransform:'uppercase',
          lineHeight:1, whiteSpace:'nowrap',
          paddingBottom: 6*s, paddingLeft: 4*s, paddingRight: 4*s,
          background:'linear-gradient(135deg,#fff 0%,rgba(120,220,255,0.92) 50%,rgba(180,120,255,0.88) 100%)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
          filter:`drop-shadow(0 0 ${20*s}px rgba(80,200,255,0.5))`,
        }}>ILMU BOT</div>

        {/* Subtitle */}
        {tweaks.logoStyle !== 'minimal' && (
          <div style={{
            fontFamily:"'Space Mono', monospace", fontSize:11*s, letterSpacing:'0.35em',
            textTransform:'uppercase', color:'rgba(120,200,255,0.7)',
            filter:`drop-shadow(0 0 ${6*s}px rgba(80,200,255,0.35))`,
            marginTop: 10*s, whiteSpace:'nowrap',
          }}>AI&nbsp;&nbsp;Assistant&nbsp;&nbsp;for&nbsp;&nbsp;Teams</div>
        )}

        {/* Tagline */}
        {tweaks.showTagline && (
          <div style={{display:'flex',alignItems:'center',gap:10*s,marginTop:18*s,width:'100%',justifyContent:'center'}}>
            <div style={{width:40*s,height:1,background:`linear-gradient(to right,transparent,${ac}55)`,flexShrink:0}}></div>
            <div style={{
              fontFamily:"'Space Grotesk',sans-serif", fontWeight:300, fontSize:9*s,
              letterSpacing:'0.11em', textTransform:'uppercase', color:'rgba(200,230,255,0.38)',
              whiteSpace:'nowrap',
            }}>Intelligent&nbsp;·&nbsp;Adaptive&nbsp;·&nbsp;Always On</div>
            <div style={{width:40*s,height:1,background:`linear-gradient(to left,transparent,${ac}55)`,flexShrink:0}}></div>
          </div>
        )}
      </div>

      {/* Bottom bar */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:`${8*s}px ${20*s}px`,
        borderTop:'1px solid rgba(80,200,255,0.1)',
        background:'linear-gradient(to top, rgba(0,5,20,0.65) 0%, transparent 100%)',
      }}>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:8*s,letterSpacing:'0.12em',
          textTransform:'uppercase',color:'rgba(120,200,255,0.38)'}}>
          <span className="status-dot" style={{width:5*s,height:5*s}}></span>Online
        </div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:8*s,letterSpacing:'0.1em',
          textTransform:'uppercase',color:'rgba(120,200,255,0.28)'}}>ILMU Bot · AI</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:8*s,letterSpacing:'0.1em',
          textTransform:'uppercase',color:'rgba(120,200,255,0.28)'}}>v2.0 · 2026</div>
      </div>
    </div>
  );
}

/* ─── App ──────────────────────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [panel,  setPanel]  = useState(false);
  const [dims,   setDims]   = useState({w:390,h:844});

  const set = (k, v) => setTweaks(prev => {
    const next = {...prev, [k]:v};
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*');
    return next;
  });

  useEffect(() => {
    const onMsg = e => {
      if (e.data?.type==='__activate_edit_mode')   setPanel(true);
      if (e.data?.type==='__deactivate_edit_mode') setPanel(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    const upd = () => {
      const vw=window.innerWidth, vh=window.innerHeight;
      // Portrait 9:19.5
      const ar = 9/19.5;
      let w,h;
      if (vw/vh > ar) { h=vh; w=h*ar; } else { w=vw; h=w/ar; }
      setDims({w:Math.round(w), h:Math.round(h)});
    };
    upd();
    window.addEventListener('resize', upd);
    return () => window.removeEventListener('resize', upd);
  }, []);

  const download = useCallback(() => {
    const cv = document.querySelector('canvas');
    if (!cv) return;
    const W=1080, H=2340;
    const out = document.createElement('canvas');
    out.width=W; out.height=H;
    const ctx = out.getContext('2d');
    ctx.drawImage(cv, 0, 0, W, H);
    // Text
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const gr=ctx.createLinearGradient(W*.2,H*.5,W*.8,H*.5);
    gr.addColorStop(0,'#fff'); gr.addColorStop(.5,'rgba(120,220,255,.95)'); gr.addColorStop(1,'rgba(180,120,255,.9)');
    ctx.font='bold 144px Arial'; ctx.fillStyle=gr;
    ctx.shadowColor=tweaks.accentColor; ctx.shadowBlur=40;
    ctx.fillText('ILMU BOT', W*.5, H*.42);
    ctx.font='38px Arial'; ctx.fillStyle='rgba(120,200,255,.7)'; ctx.shadowBlur=12;
    ctx.fillText('AI  ASSISTANT  FOR  TEAMS', W*.5, H*.47);
    out.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='ILMU-Bot-Background.png'; a.click();
      URL.revokeObjectURL(url);
    },'image/png');
  }, [tweaks.accentColor]);

  return (
    <div style={{width:'100vw',height:'100vh',background:'#000',display:'flex',
      alignItems:'center',justifyContent:'center',overflow:'hidden'}}>

      <div style={{position:'relative',width:dims.w,height:dims.h,flexShrink:0,overflow:'hidden'}}>
        <NeuralCanvas width={dims.w} height={dims.h} tweaks={tweaks}/>
        <Overlay      width={dims.w} height={dims.h} tweaks={tweaks}/>
      </div>

      <TweaksPanel tweaks={tweaks} set={set} visible={panel} onClose={hide=>setPanel(!hide)}/>
      <button className="dl-btn" onClick={download}>↓ Export PNG</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
